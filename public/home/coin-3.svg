<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="goldFront" cx="40%" cy="40%" r="60%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#fff080" />
      <stop offset="40%" stop-color="#ffca28" />
      <stop offset="100%" stop-color="#b38600" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.4" />
    </filter>
  </defs>

  <circle cx="250" cy="250" r="240" fill="url(#goldFront)" stroke="#8b6508" stroke-width="8" filter="url(#shadow)" />
  
  <circle cx="250" cy="250" r="215" fill="none" stroke="#b8860b" stroke-width="4" stroke-dasharray="12 6" />
  
  <circle cx="250" cy="250" r="185" fill="url(#goldFront)" stroke="#a67c00" stroke-width="6" />

  <path id="textPathTop" d="M 120 250 A 130 130 0 0 1 380 250" fill="none" />
  <text fill="#5c4400" font-family="monospace, sans-serif" font-weight="bold" font-size="34" letter-spacing="2">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">BUILD THE FUTURE</textPath>
  </text>

  <g transform="translate(250, 270)">
    <polygon points="0,-80 80,60 -80,60" fill="none" stroke="#5c4400" stroke-width="12" stroke-linejoin="round" />
    <circle cx="0" cy="15" r="20" fill="#5c4400" />
  </g>
</svg>
